name: Keep Supabase warm

# Prevents Supabase Free tier from auto-pausing after 7 days of inactivity.
# Pings the REST endpoint every 3 days — a 401 response counts as activity.

on:
  schedule:
    - cron: "17 8 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            https://zncidbkogsatnujzryyf.supabase.co/rest/v1/)
          echo "HTTP $code"
          if [ "$code" = "401" ] || [ "$code" = "200" ] || [ "$code" = "404" ]; then
            echo "OK — Supabase responded"
            exit 0
          fi
          echo "Unexpected response — Supabase may be down or paused"
          exit 1
